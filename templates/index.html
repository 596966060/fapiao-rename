<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发票批量重命名工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            margin-bottom: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f3ff;
        }

        .upload-area.dragover {
            background: #e0e7ff;
            border-color: #764ba2;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .upload-hint {
            font-size: 13px;
            color: #999;
            margin-bottom: 20px;
        }

        .upload-formats {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }

        input[type="file"] {
            display: none;
        }

        .results-section {
            display: none;
        }

        .results-section.show {
            display: block;
        }

        .progress-section {
            margin-bottom: 20px;
        }

        .progress-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .progress-bar-container {
            flex: 1;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin: 0 15px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            width: 0%;
        }

        .file-list {
            max-height: 600px;
            overflow-y: auto;
            background: #f8f9ff;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .file-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .file-item.error {
            border-left-color: #f56565;
        }

        .file-item.success {
            border-left-color: #48bb78;
        }

        .file-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            word-break: break-all;
        }

        .file-new-name {
            color: #667eea;
            font-family: monospace;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .file-fields {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            font-size: 12px;
        }

        .field {
            color: #666;
        }

        .field-label {
            font-weight: 600;
            color: #333;
        }

        .file-status {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 8px;
        }

        .file-status.success {
            background: #c6f6d5;
            color: #22543d;
        }

        .file-status.error {
            background: #fed7d7;
            color: #742a2a;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-box {
            flex: 1;
            min-width: 150px;
            background: #f0f3ff;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-upload {
            background: #667eea;
            color: white;
        }

        .btn-upload:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-download {
            background: #48bb78;
            color: white;
        }

        .btn-download:hover {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(72, 187, 120, 0.3);
        }

        .btn-download:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            transform: none;
        }

        .btn-reset {
            background: #f56565;
            color: white;
        }

        .btn-reset:hover {
            background: #e53e3e;
        }

        .status-message {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .status-message.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status-message.loading {
            background: #e0e7ff;
            color: #667eea;
        }

        .status-message.success {
            background: #c6f6d5;
            color: #22543d;
        }

        .status-message.error {
            background: #fed7d7;
            color: #742a2a;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid currentColor;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        @media (max-width: 600px) {
            .card {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .file-fields {
                grid-template-columns: 1fr;
            }

            .stats {
                flex-direction: column;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📄 发票批量重命名工具</h1>
            <p class="subtitle">智能识别 → 自动重命名 → 批量下载</p>

            <div id="initStatus" class="status-message show loading">
                <span class="spinner"></span>正在初始化 OCR 模型（首次需要 1-2 分钟），请稍候...
            </div>

            <div id="statusMessage" class="status-message"></div>

            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📤</div>
                <div class="upload-text">点击或拖拽上传</div>
                <div class="upload-hint">支持批量上传单个文件或 ZIP 压缩包</div>
                <div class="upload-formats">
                    ✓ PDF &nbsp; ✓ JPG/PNG/BMP/GIF/TIFF &nbsp; ✓ ZIP
                </div>
                <input type="file" id="fileInput" multiple accept=".pdf,.jpg,.jpeg,.png,.bmp,.gif,.tiff,.tif,.zip">
            </div>

            <div id="resultsSection" class="results-section">
                <div class="stats" id="stats" style="display: none;">
                    <div class="stat-box">
                        <div class="stat-number" id="totalFiles">0</div>
                        <div class="stat-label">总文件数</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="successFiles">0</div>
                        <div class="stat-label">成功识别</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="failFiles">0</div>
                        <div class="stat-label">识别失败</div>
                    </div>
                </div>

                <div class="file-list" id="fileList"></div>

                <div class="button-group">
                    <button class="btn-upload" onclick="document.getElementById('fileInput').click()">
                        📤 继续上传
                    </button>
                    <button class="btn-download" id="downloadBtn" onclick="downloadResults()">
                        ⬇️ 批量下载
                    </button>
                    <button class="btn-reset" onclick="resetAll()">
                        🔄 重新开始
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentSessionId = null;
        let uploadedResults = [];
        let ocrReady = false;

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const resultsSection = document.getElementById('resultsSection');

        // 检查 OCR 初始化状态
        function checkOCRStatus() {
            fetch('/api/status')
                .then(r => r.json())
                .then(data => {
                    ocrReady = data.ready;
                    const initStatus = document.getElementById('initStatus');

                    if (data.ready) {
                        initStatus.innerHTML = '✅ OCR 已准备好，可以开始上传';
                        initStatus.className = 'status-message show success';
                        setTimeout(() => {
                            initStatus.style.display = 'none';
                        }, 3000);
                    } else {
                        // 继续检查
                        setTimeout(checkOCRStatus, 2000);
                    }
                })
                .catch(() => {
                    setTimeout(checkOCRStatus, 2000);
                });
        }

        // 页面加载时检查
        checkOCRStatus();

        // 拖拽
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            if (ocrReady) uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (ocrReady) handleFiles(e.dataTransfer.files);
        });

        uploadArea.addEventListener('click', () => {
            if (ocrReady) fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            if (ocrReady) handleFiles(e.target.files);
        });

        function showStatus(message, type) {
            const el = document.getElementById('statusMessage');
            el.innerHTML = type === 'loading'
                ? `<span class="spinner"></span>${message}`
                : message;
            el.className = `status-message show ${type}`;
        }

        function handleFiles(files) {
            if (files.length === 0) return;

            const formData = new FormData();
            for (let file of files) {
                formData.append('files[]', file);
            }

            showStatus('⏳ 处理中，请稍候...', 'loading');
            uploadArea.style.opacity = '0.5';

            fetch('/api/upload', {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    showStatus(`❌ ${data.error}`, 'error');
                } else {
                    currentSessionId = data.session_id;
                    uploadedResults = data.results;
                    displayResults(data);
                    showStatus('✅ 识别完成！', 'success');
                }
            })
            .catch(err => {
                showStatus(`❌ 上传失败: ${err.message}`, 'error');
            })
            .finally(() => {
                uploadArea.style.opacity = '1';
            });
        }

        function displayResults(data) {
            const totalFiles = data.total;
            const successFiles = data.results.filter(r => r.status === 'success').length;
            const failFiles = totalFiles - successFiles;

            document.getElementById('totalFiles').textContent = totalFiles;
            document.getElementById('successFiles').textContent = successFiles;
            document.getElementById('failFiles').textContent = failFiles;
            document.getElementById('stats').style.display = 'flex';

            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '';

            data.results.forEach(item => {
                const div = document.createElement('div');
                div.className = `file-item ${item.status}`;

                if (item.status === 'success') {
                    div.innerHTML = `
                        <div class="file-name">📄 ${item.filename}</div>
                        <div class="file-new-name">✓ ${item.new_name}</div>
                        <div class="file-fields">
                            <div class="field">
                                <span class="field-label">日期:</span> ${item.data.date || '-'}
                            </div>
                            <div class="field">
                                <span class="field-label">号码:</span> ${item.data.invoice_number || '-'}
                            </div>
                            <div class="field">
                                <span class="field-label">购买方:</span> ${item.data.buyer || '-'}
                            </div>
                            <div class="field">
                                <span class="field-label">销售方:</span> ${item.data.supplier || '-'}
                            </div>
                            <div class="field">
                                <span class="field-label">金额:</span> ${item.data.amount || '-'}
                            </div>
                        </div>
                        <span class="file-status success">✓ 识别成功</span>
                    `;
                } else {
                    div.innerHTML = `
                        <div class="file-name">❌ ${item.filename}</div>
                        <span class="file-status error">✗ ${item.error}</span>
                    `;
                }
                fileList.appendChild(div);
            });

            resultsSection.classList.add('show');
            document.getElementById('downloadBtn').disabled = successFiles === 0;
        }

        function downloadResults() {
            if (!currentSessionId) return;

            const btn = document.getElementById('downloadBtn');
            btn.disabled = true;
            showStatus('⏳ 准备下载...', 'loading');

            window.location.href = `/api/download/${currentSessionId}`;

            setTimeout(() => {
                btn.disabled = false;
                showStatus('✅ 下载完成！', 'success');
            }, 1000);
        }

        function resetAll() {
            fileInput.value = '';
            resultsSection.classList.remove('show');
            document.getElementById('fileList').innerHTML = '';
            document.getElementById('statusMessage').classList.remove('show');
            currentSessionId = null;
            uploadedResults = [];
            uploadArea.click();
        }
    </script>
</body>
</html>
